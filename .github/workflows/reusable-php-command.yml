name: PHP Command
on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version'
        type: string
        default: '8.2'
      command:
        description: 'Command to run after composer install'
        type: string
        required: true
      php-extensions:
        description: 'PHP extensions to install'
        type: string
        default: ''
      composer-args:
        description: 'Additional composer install arguments'
        type: string
        default: '--no-interaction --no-progress --prefer-dist'
      run-environment:
        description: 'RUN_ENVIRONMENT value'
        type: string
        default: 'local'

jobs:
  run:
    name: Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          coverage: none
          php-version: "${{ inputs.php-version }}"
          extensions: "${{ inputs.php-extensions }}"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: php-${{ inputs.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: php-${{ inputs.php-version }}-composer-

      - name: Install dependencies
        run: composer install ${{ inputs.composer-args }}

      - name: Run command
        run: ${{ inputs.command }}
        env:
          RUN_ENVIRONMENT: ${{ inputs.run-environment }}
